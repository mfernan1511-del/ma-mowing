<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>M&A Mowing — Weekend Crew Tracker</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌿</text></svg>">
<style>
  :root{
    --green-950:#06150c;
    --green-900:#0a2615;
    --green-800:#0f3a20;
    --green-700:#15512c;
    --green-600:#1d6e3a;
    --green-500:#268f4b;
    --gold-500:#e8b923;
    --gold-400:#f3cb45;
    --gold-300:#f8dd7c;
    --cream:#fbf8ee;
    --danger:#e2554a;
    --radius:18px;
    --shadow-lg: 0 20px 50px -12px rgba(0,0,0,.45);
    --shadow-sm: 0 4px 14px rgba(0,0,0,.25);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:
      radial-gradient(circle at 15% 0%, rgba(232,185,35,.10), transparent 45%),
      radial-gradient(circle at 100% 30%, rgba(38,143,75,.18), transparent 50%),
      linear-gradient(160deg,var(--green-950),var(--green-900) 55%,#081d10 100%);
    color:var(--cream);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
    overscroll-behavior-y:none;
  }
  .wrap{max-width:560px;margin:0 auto;padding:18px 16px 90px;}

  /* Header */
  header.app-header{
    display:flex;align-items:center;justify-content:space-between;
    padding:6px 2px 18px;
    animation:fadeDown .6s ease both;
  }
  .brand{display:flex;align-items:center;gap:10px;}
  .brand .logo{
    width:42px;height:42px;border-radius:12px;
    background:linear-gradient(135deg,var(--gold-400),var(--gold-500));
    display:flex;align-items:center;justify-content:center;font-size:22px;
    box-shadow:var(--shadow-sm);
    transform:rotate(-6deg);
  }
  .brand h1{font-size:18px;margin:0;letter-spacing:.3px;font-weight:800;}
  .brand .sub{font-size:11px;color:var(--gold-300);font-weight:600;letter-spacing:.5px;text-transform:uppercase;opacity:.85;}

  .lock-btn{
    border:1px solid rgba(232,185,35,.35);
    background:rgba(255,255,255,.04);
    color:var(--gold-300);
    border-radius:999px;
    padding:8px 14px;
    font-size:13px;
    font-weight:700;
    display:flex;align-items:center;gap:6px;
    cursor:pointer;
    transition:transform .15s ease, background .2s ease;
  }
  .lock-btn:active{transform:scale(.94);}
  .lock-btn.unlocked{
    background:linear-gradient(135deg,var(--gold-400),var(--gold-500));
    color:#1c1300; border-color:transparent;
  }

  /* Earnings card */
  .earnings-card{
    position:relative;
    border-radius:24px;
    padding:26px 22px 24px;
    background:linear-gradient(135deg,var(--green-700),var(--green-800) 60%,var(--green-900));
    box-shadow:var(--shadow-lg), inset 0 1px 0 rgba(255,255,255,.06);
    overflow:hidden;
    animation:popIn .55s cubic-bezier(.2,.9,.25,1.2) both;
  }
  .earnings-card::before{
    content:"";position:absolute;inset:-40% -10% auto auto;width:220px;height:220px;
    background:radial-gradient(circle, rgba(232,185,35,.22), transparent 70%);
    pointer-events:none;
  }
  .earnings-label{
    font-size:12px;text-transform:uppercase;letter-spacing:1.5px;
    color:var(--gold-300);font-weight:700;opacity:.9;
  }
  .earnings-total{
    font-size:56px;font-weight:800;letter-spacing:-1px;line-height:1.05;
    margin:6px 0 2px;
    background:linear-gradient(135deg,#fff,var(--gold-300));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    transition:transform .25s ease;
  }
  .earnings-total.bump{transform:scale(1.06);}
  .earnings-meta{
    display:flex;gap:18px;margin-top:14px;font-size:13px;color:rgba(251,248,238,.75);
  }
  .earnings-meta b{color:var(--cream);font-weight:700;}

  /* Section headers */
  .section{margin-top:28px;}
  .section-head{
    display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px;
  }
  .section-head h2{font-size:15px;margin:0;font-weight:800;letter-spacing:.3px;}
  .section-head .count{font-size:12px;color:var(--gold-300);font-weight:700;}

  /* Weekend list */
  .empty-state{
    text-align:center;padding:36px 18px;border-radius:18px;
    border:1.5px dashed rgba(255,255,255,.15);
    color:rgba(251,248,238,.55);font-size:14px;
  }
  .client-card{
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    background:rgba(255,255,255,.045);
    border:1px solid rgba(255,255,255,.07);
    border-radius:16px;
    padding:14px 14px;
    margin-bottom:10px;
    animation:slideUp .35s ease both;
    transition:background .2s ease, transform .15s ease;
  }
  .client-card:active{transform:scale(.985);}
  .client-card .info{display:flex;flex-direction:column;gap:2px;min-width:0;}
  .client-card .name{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .client-card .price{font-size:13px;color:var(--gold-300);font-weight:700;}
  .client-card .actions{display:flex;align-items:center;gap:8px;flex-shrink:0;}

  .icon-btn{
    width:34px;height:34px;border-radius:10px;border:none;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;font-size:16px;font-weight:700;
    transition:transform .15s ease, opacity .2s ease;
  }
  .icon-btn:active{transform:scale(.88);}
  .icon-btn.add{background:linear-gradient(135deg,var(--gold-400),var(--gold-500));color:#1c1300;}
  .icon-btn.remove{background:rgba(226,85,74,.16);color:var(--danger);}
  .icon-btn.delete{background:rgba(226,85,74,.12);color:var(--danger);font-size:13px;}
  .icon-btn[disabled]{opacity:.25;pointer-events:none;}

  /* Roster card variant (in weekend already) */
  .client-card.in-weekend{border-color:rgba(232,185,35,.4);background:rgba(232,185,35,.06);}
  .tappable{cursor:pointer;}
  .info.tappable{flex:1;}
  .tap-hint{font-size:11px;color:rgba(251,248,238,.4);font-weight:600;white-space:nowrap;}
  .badge{
    font-size:10px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;
    background:rgba(232,185,35,.18);color:var(--gold-300);
    padding:3px 7px;border-radius:999px;margin-left:6px;
  }

  /* Add client form */
  .add-form{
    display:none;
    gap:8px;margin-bottom:14px;
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.08);
    border-radius:16px;padding:12px;
    animation:slideUp .3s ease both;
  }
  .add-form.show{display:flex;flex-wrap:wrap;}
  .add-form input{
    flex:1;min-width:90px;
    background:rgba(0,0,0,.25);
    border:1px solid rgba(255,255,255,.12);
    border-radius:10px;color:var(--cream);
    padding:10px 12px;font-size:14px;outline:none;
  }
  .add-form input:focus{border-color:var(--gold-400);}
  .add-form button{
    background:linear-gradient(135deg,var(--gold-400),var(--gold-500));
    border:none;color:#1c1300;font-weight:800;border-radius:10px;
    padding:0 16px;font-size:14px;cursor:pointer;
  }

  .fab-row{display:flex;gap:10px;margin-bottom:14px;}
  .pill-btn{
    flex:1;
    border:1px solid rgba(232,185,35,.3);
    background:rgba(255,255,255,.04);
    color:var(--gold-300);font-weight:700;font-size:13px;
    border-radius:14px;padding:11px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:6px;
    transition:background .2s ease, transform .15s ease;
  }
  .pill-btn:active{transform:scale(.96);}
  .pill-btn.primary{
    background:linear-gradient(135deg,var(--gold-400),var(--gold-500));
    color:#1c1300;border-color:transparent;
  }

  footer{
    text-align:center;font-size:11px;color:rgba(251,248,238,.35);
    margin-top:40px;letter-spacing:.4px;
  }

  /* Modal (PIN) */
  .overlay{
    position:fixed;inset:0;background:rgba(0,0,0,.6);
    backdrop-filter:blur(4px);
    display:none;align-items:center;justify-content:center;
    z-index:50;padding:20px;
    animation:fadeIn .2s ease both;
  }
  .overlay.show{display:flex;}
  .modal{
    background:linear-gradient(160deg,var(--green-800),var(--green-900));
    border:1px solid rgba(232,185,35,.25);
    border-radius:20px;padding:26px 22px;width:100%;max-width:320px;
    box-shadow:var(--shadow-lg);
    animation:popIn .3s cubic-bezier(.2,.9,.25,1.2) both;
    text-align:center;
  }
  .modal h3{margin:0 0 4px;font-size:17px;}
  .modal p{margin:0 0 16px;font-size:13px;color:rgba(251,248,238,.6);}
  .pin-dots{display:flex;gap:12px;justify-content:center;margin:18px 0;}
  .pin-dot{
    width:16px;height:16px;border-radius:50%;
    border:2px solid rgba(232,185,35,.4);
    transition:background .15s ease, transform .15s ease;
  }
  .pin-dot.filled{background:var(--gold-400);border-color:var(--gold-400);transform:scale(1.1);}
  .pin-dot.shake{animation:shake .4s ease;}
  .keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .keypad button{
    aspect-ratio:1;border-radius:14px;border:none;
    background:rgba(255,255,255,.06);color:var(--cream);
    font-size:19px;font-weight:700;cursor:pointer;
    transition:background .15s ease, transform .1s ease;
  }
  .keypad button:active{transform:scale(.92);background:rgba(232,185,35,.25);}
  .keypad button.wide{grid-column:span 1;font-size:13px;color:var(--gold-300);}
  .modal-close{
    margin-top:14px;background:none;border:none;color:rgba(251,248,238,.45);
    font-size:13px;cursor:pointer;text-decoration:underline;
  }

  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--green-700);color:var(--cream);
    padding:11px 20px;border-radius:999px;font-size:13px;font-weight:600;
    box-shadow:var(--shadow-sm);opacity:0;transition:all .3s ease;
    z-index:60;border:1px solid rgba(232,185,35,.3);
    pointer-events:none;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  @keyframes fadeDown{from{opacity:0;transform:translateY(-10px);}to{opacity:1;transform:translateY(0);}}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  @keyframes popIn{from{opacity:0;transform:scale(.92);}to{opacity:1;transform:scale(1);}}
  @keyframes slideUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}
</style>
</head>
<body>
<div class="wrap">

  <header class="app-header">
    <div class="brand">
      <div class="logo">🌿</div>
      <div>
        <h1>M&amp;A Mowing</h1>
        <div class="sub">Weekend Crew Tracker</div>
      </div>
    </div>
    <button class="lock-btn" id="lockBtn" onclick="onLockClick()">🔒 Locked</button>
  </header>

  <div class="earnings-card">
    <div class="earnings-label">This Weekend's Total</div>
    <div class="earnings-total" id="totalDisplay">$0</div>
    <div class="earnings-meta">
      <div><b id="jobCount">0</b> jobs</div>
      <div><b id="avgJob">$0</b> avg / job</div>
    </div>
  </div>

  <div class="section">
    <div class="section-head">
      <h2>📅 This Weekend</h2>
      <span class="count" id="weekendCount">0 clients</span>
    </div>
    <div id="weekendList"></div>
  </div>

  <div class="section">
    <div class="section-head">
      <h2>👥 Client Roster</h2>
      <span class="count" id="rosterCount">0 total</span>
    </div>

    <div class="fab-row" id="editControls" style="display:none;">
      <button class="pill-btn primary" onclick="toggleAddForm()">＋ New Client</button>
    </div>

    <div class="add-form" id="addForm">
      <input type="text" id="newName" placeholder="Client name">
      <input type="number" id="newPrice" placeholder="Price $" min="0">
      <button onclick="addClient()">Add</button>
    </div>

    <div id="rosterList"></div>
  </div>

  <footer>Built for the M&amp;A Mowing crew 🌿💰</footer>
</div>

<div class="overlay" id="pinOverlay">
  <div class="modal">
    <h3 id="pinTitle">Enter PIN</h3>
    <p id="pinSub">Boss access only</p>
    <div class="pin-dots" id="pinDots">
      <div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div><div class="pin-dot"></div>
    </div>
    <div class="keypad" id="keypad"></div>
    <button class="modal-close" onclick="closePinModal()">Cancel</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'ma_mowing_clients_v2';
const WEEKEND_KEY = 'ma_mowing_weekend_v2';
const PIN_KEY = 'ma_mowing_pin_v1';
const UNLOCK_KEY = 'ma_mowing_unlocked_session';
const DEFAULT_PIN = '5070';

let clients = [];
let weekendIds = [];
let unlocked = false;
let pinEntry = '';
let pinMode = 'unlock'; // 'unlock' | 'setup' | 'confirm'
let pendingNewPin = '';

async function init(){
  const savedClients = localStorage.getItem(STORAGE_KEY);
  if(savedClients){
    clients = JSON.parse(savedClients);
  } else {
    try{
      const res = await fetch('clients.json');
      const data = await res.json();
      clients = data.clients;
    }catch(e){ clients = []; }
    saveClients();
  }

  const savedWeekend = localStorage.getItem(WEEKEND_KEY);
  weekendIds = savedWeekend ? JSON.parse(savedWeekend) : [];

  unlocked = sessionStorage.getItem(UNLOCK_KEY) === 'true';
  updateLockUI();
  render();
}

function saveClients(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(clients)); }
function saveWeekend(){ localStorage.setItem(WEEKEND_KEY, JSON.stringify(weekendIds)); }
function getPin(){ return localStorage.getItem(PIN_KEY) || DEFAULT_PIN; }

function render(){
  renderTotals();
  renderWeekend();
  renderRoster();
  document.getElementById('editControls').style.display = unlocked ? 'flex' : 'none';
}

function renderTotals(){
  const weekendClients = clients.filter(c => weekendIds.includes(c.id));
  const total = weekendClients.reduce((s,c) => s + Number(c.price), 0);
  const el = document.getElementById('totalDisplay');
  el.textContent = '$' + total.toLocaleString();
  el.classList.remove('bump');
  requestAnimationFrame(()=>el.classList.add('bump'));
  setTimeout(()=>el.classList.remove('bump'), 250);
  document.getElementById('jobCount').textContent = weekendClients.length;
  document.getElementById('avgJob').textContent = weekendClients.length ? '$' + Math.round(total/weekendClients.length) : '$0';
  document.getElementById('weekendCount').textContent = weekendClients.length + ' client' + (weekendClients.length===1?'':'s');
  document.getElementById('rosterCount').textContent = clients.length + ' total';
}

function renderWeekend(){
  const list = document.getElementById('weekendList');
  const weekendClients = clients.filter(c => weekendIds.includes(c.id));
  if(weekendClients.length === 0){
    list.innerHTML = `<div class="empty-state">No clients added yet.<br>${unlocked ? 'Add some from the roster below 👇' : 'Check back after the boss sets the schedule.'}</div>`;
    return;
  }
  list.innerHTML = weekendClients.map(c => `
    <div class="client-card ${unlocked ? 'tappable' : ''}" ${unlocked ? `onclick="removeFromWeekend('${c.id}')"` : ''}>
      <div class="info">
        <div class="name">${escapeHtml(c.name)}</div>
        <div class="price">$${Number(c.price).toLocaleString()}</div>
      </div>
      <div class="actions">
        ${unlocked ? `<span class="tap-hint">tap to remove</span>` : ''}
      </div>
    </div>
  `).join('');
}

function renderRoster(){
  const list = document.getElementById('rosterList');
  if(clients.length === 0){
    list.innerHTML = `<div class="empty-state">No clients yet.</div>`;
    return;
  }
  list.innerHTML = clients.map(c => {
    const inWeekend = weekendIds.includes(c.id);
    return `
    <div class="client-card ${inWeekend ? 'in-weekend' : ''}">
      <div class="info ${unlocked ? 'tappable' : ''}" ${unlocked ? `onclick="toggleWeekend('${c.id}')"` : ''}>
        <div class="name">${escapeHtml(c.name)} ${inWeekend ? '<span class="badge">scheduled</span>' : ''}</div>
        <div class="price">$${Number(c.price).toLocaleString()}</div>
      </div>
      <div class="actions">
        ${unlocked ? `<button class="icon-btn delete" onclick="deleteClient('${c.id}')" title="Delete client">🗑</button>` : ''}
      </div>
    </div>`;
  }).join('');
}

function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function toggleWeekend(id){
  if(weekendIds.includes(id)) removeFromWeekend(id);
  else addToWeekend(id);
}

function addToWeekend(id){
  if(!unlocked) return;
  if(!weekendIds.includes(id)) weekendIds.push(id);
  saveWeekend();
  render();
  showToast('Added to this weekend ✅');
}

function removeFromWeekend(id){
  if(!unlocked) return;
  weekendIds = weekendIds.filter(i => i !== id);
  saveWeekend();
  render();
  showToast('Removed from weekend');
}

function deleteClient(id){
  if(!unlocked) return;
  if(!confirm('Delete this client from the roster?')) return;
  clients = clients.filter(c => c.id !== id);
  weekendIds = weekendIds.filter(i => i !== id);
  saveClients(); saveWeekend(); render();
  showToast('Client deleted');
}

function toggleAddForm(){
  document.getElementById('addForm').classList.toggle('show');
}

function addClient(){
  if(!unlocked) return;
  const name = document.getElementById('newName').value.trim();
  const price = parseFloat(document.getElementById('newPrice').value);
  if(!name || isNaN(price) || price < 0){
    showToast('Enter a valid name and price'); return;
  }
  const id = 'c' + Date.now();
  clients.push({id, name, price});
  saveClients();
  document.getElementById('newName').value='';
  document.getElementById('newPrice').value='';
  document.getElementById('addForm').classList.remove('show');
  render();
  showToast('Client added 🌿');
}

/* ---- PIN / Lock logic ---- */
function updateLockUI(){
  const btn = document.getElementById('lockBtn');
  btn.textContent = unlocked ? '🔓 Unlocked' : '🔒 Locked';
  btn.classList.toggle('unlocked', unlocked);
}

function onLockClick(){
  if(unlocked){
    unlocked = false;
    sessionStorage.removeItem(UNLOCK_KEY);
    updateLockUI();
    render();
    showToast('Locked');
  } else {
    openPinModal('unlock');
  }
}

function buildKeypad(){
  const keys = ['1','2','3','4','5','6','7','8','9','change','0','back'];
  const keypad = document.getElementById('keypad');
  keypad.innerHTML = keys.map(k => {
    if(k === 'back') return `<button onclick="pinBackspace()">⌫</button>`;
    if(k === 'change') return `<button class="wide" onclick="startChangePin()" id="changePinKey">PIN</button>`;
    return `<button onclick="pinPress('${k}')">${k}</button>`;
  }).join('');
}

function openPinModal(mode){
  pinMode = mode;
  pinEntry = '';
  buildKeypad();
  document.getElementById('changePinKey').style.visibility = (mode==='unlock') ? 'visible' : 'hidden';
  document.getElementById('pinTitle').textContent = mode === 'confirm' ? 'Confirm New PIN' : (mode === 'setup' ? 'Set New PIN' : 'Enter PIN');
  document.getElementById('pinSub').textContent = mode === 'unlock' ? 'Boss access only' : 'Choose 4 digits';
  updatePinDots();
  document.getElementById('pinOverlay').classList.add('show');
}

function closePinModal(){
  document.getElementById('pinOverlay').classList.remove('show');
  pinEntry = '';
}

function startChangePin(){
  pendingNewPin = '';
  openPinModal('setup');
}

function pinPress(d){
  if(pinEntry.length >= 4) return;
  pinEntry += d;
  updatePinDots();
  if(pinEntry.length === 4) setTimeout(()=>submitPin(), 150);
}

function pinBackspace(){
  pinEntry = pinEntry.slice(0,-1);
  updatePinDots();
}

function updatePinDots(){
  const dots = document.querySelectorAll('.pin-dot');
  dots.forEach((dot,i) => dot.classList.toggle('filled', i < pinEntry.length));
}

function shakeDots(){
  const wrap = document.getElementById('pinDots');
  wrap.querySelectorAll('.pin-dot').forEach(d=>d.classList.add('shake'));
  setTimeout(()=>wrap.querySelectorAll('.pin-dot').forEach(d=>d.classList.remove('shake')), 400);
}

function submitPin(){
  if(pinMode === 'unlock'){
    if(pinEntry === getPin()){
      unlocked = true;
      sessionStorage.setItem(UNLOCK_KEY, 'true');
      updateLockUI();
      closePinModal();
      render();
      showToast('Unlocked 🔓');
    } else {
      shakeDots();
      setTimeout(()=>{ pinEntry=''; updatePinDots(); }, 350);
    }
  } else if(pinMode === 'setup'){
    pendingNewPin = pinEntry;
    pinEntry='';
    pinMode='confirm';
    document.getElementById('pinTitle').textContent = 'Confirm New PIN';
    document.getElementById('pinSub').textContent = 'Type it again';
    updatePinDots();
  } else if(pinMode === 'confirm'){
    if(pinEntry === pendingNewPin){
      localStorage.setItem(PIN_KEY, pendingNewPin);
      closePinModal();
      showToast('PIN updated 🔐');
    } else {
      shakeDots();
      setTimeout(()=>{
        pinEntry=''; pendingNewPin=''; pinMode='setup';
        document.getElementById('pinTitle').textContent = 'Set New PIN';
        document.getElementById('pinSub').textContent = "Didn't match, try again";
        updatePinDots();
      }, 350);
    }
  }
}

let toastTimer;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 1800);
}

init();
</script>
</body>
</html>
